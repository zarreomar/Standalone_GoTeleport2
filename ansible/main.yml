---
# Root Ansible Playbook for GoTeleport Docker Swarm Deployment
# Orchestrates complete deployment from prerequisites through verification

- name: GoTeleport Docker Swarm Deployment
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Validate required variables are defined
      ansible.builtin.assert:
        that:
          - image_name is defined
          - public_domain is defined
          - acme_email is defined
          - public_ip is defined
          - internal_ip is defined
          - swarm_subnet is defined
          - internal_subnet is defined
          - postgres_host is defined
          - postgres_port is defined
          - postgres_user is defined
          - postgres_password is defined
          - postgres_backend_db is defined
          - postgres_audit_db is defined
          - postgres_sslmode is defined
          - postgres_image_name is defined
          - minio_image_name is defined
          - minio_mc_image_name is defined
          - minio_root_user is defined
          - minio_root_password is defined
          - minio_bucket is defined
          - minio_region is defined
          - minio_endpoint is defined
          - minio_console_port is defined
          - teleport_audit_sessions_uri is defined
        fail_msg: "Required variables not found. See ansible/group_vars/all.yml.example"

    - name: Display deployment configuration
      ansible.builtin.debug:
        msg: |
          ======================================
          GoTeleport Deployment Configuration
          ======================================
          Image: {{ image_name }}
          Domain: {{ public_domain }}
          Service: {{ service_name }}
          Replicas: {{ replicas | default(3) }}
          Environment: {{ deploy_environment | default('production') }}
          Public IP (ens3): {{ public_ip }}
          Internal IP (ens4): {{ internal_ip }}
          PostgreSQL host: {{ postgres_host }}:{{ postgres_port }}
          MinIO endpoint: {{ minio_endpoint }}
          ======================================

  roles:
    - role: teleport_install
      tags:
        - install
        - services

    - role: network_setup
      tags:
        - networking
        - routing

  tasks:
    - name: Verify Docker Swarm is initialized
      ansible.builtin.shell:
        cmd: docker info | grep -i "swarm.*active"
      register: swarm_status
      changed_when: false
      failed_when: swarm_status.rc != 0

    - name: Build PostgreSQL image with wal2json
      ansible.builtin.command:
        cmd: docker build -t {{ postgres_image_name }} -f {{ playbook_dir }}/../postgres/Dockerfile {{ playbook_dir }}/../postgres
      register: postgres_build
      changed_when: "'Successfully built' in postgres_build.stdout or postgres_build.rc == 0"

    - name: Create Docker overlay network for services
      ansible.builtin.shell:
        cmd: docker network inspect teleport-net >/dev/null 2>&1 || docker network create --driver overlay --attachable teleport-net
      register: overlay_network
      changed_when: overlay_network.rc == 0

    - name: Render stack compose file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../service/docker-compose.yml"
        dest: /tmp/goteleport-docker-compose.yml
        mode: '0644'

    - name: Deploy stack using docker stack deploy
      ansible.builtin.shell:
        cmd: docker stack deploy -c /tmp/goteleport-docker-compose.yml gotTeleport_stack
      environment:
        COMPOSE_PARALLEL_PUSH: 1
      register: stack_deploy
      changed_when: "'Ignoring unsupported' not in stack_deploy.stderr"

    - name: Ensure MinIO session bucket exists and has versioning enabled
      ansible.builtin.shell:
        cmd: >
          docker run --rm --network teleport-net
          -e MC_HOST_local=http://{{ minio_root_user }}:{{ minio_root_password }}@minio:9000
          {{ minio_mc_image_name }}
          mb --ignore-existing local/{{ minio_bucket }} &&
          docker run --rm --network teleport-net
          -e MC_HOST_local=http://{{ minio_root_user }}:{{ minio_root_password }}@minio:9000
          {{ minio_mc_image_name }}
          version enable local/{{ minio_bucket }}
      register: minio_bucket_init
      retries: 12
      delay: 5
      until: minio_bucket_init.rc == 0

    - name: Wait for stack services to be deployed
      ansible.builtin.shell:
        cmd: docker service ps gotTeleport_stack_{{ service_name }} | grep -q Running
      register: service_info
      retries: 20
      delay: 10
      until: service_info.rc == 0

    - name: Verify stack deployment
      ansible.builtin.shell:
        cmd: docker stack ps gotTeleport_stack
      register: stack_status
      changed_when: false
      when: not ansible_check_mode

    - name: Display service status
      ansible.builtin.debug:
        msg: "{{ stack_status.stdout_lines }}"
      when: not ansible_check_mode

    - name: Health check - verify service replicas
      ansible.builtin.assert:
        that:
          - "'Running' in stack_status.stdout"
        fail_msg: "Service failed to start. Check logs: docker service logs gotTeleport_stack_gotTeleport"
      when: not ansible_check_mode

    - name: Wait for health checks to pass
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting for health checks to stabilize..."
      when: not ansible_check_mode

    - name: Verify service connectivity
      ansible.builtin.shell:
        cmd: curl -sk -o /dev/null -w "%{http_code}" https://{{ public_domain }}/webapi/ping || echo "0"
      register: health_check
      retries: 5
      delay: 10
      until: health_check.stdout == "200"
      when: not ansible_check_mode

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ======================================
          ✓ Deployment Successful
          ======================================
          Traefik Dashboard: https://traefik.{{ public_domain }}:8080
          Service Endpoint: https://{{ public_domain }}
          SSH Port: {{ public_ip }}:3022
          Health Check: curl -k https://{{ public_domain }}/webapi/ping
          Backend: PostgreSQL {{ postgres_host }}:{{ postgres_port }}
          Session storage: s3://{{ minio_bucket }}/records via {{ minio_endpoint }}

          Next Steps:
          1. Verify DNS resolution: nslookup {{ public_domain }}
          2. Check ACME cert: docker service logs gotTeleport_stack_traefik | grep acme
          3. Monitor logs: docker service logs gotTeleport_stack_gotTeleport
          4. Test connectivity: curl -k https://{{ public_domain }}
          ======================================
        verbosity: 0
      when: not ansible_check_mode

  post_tasks:
    - name: Create rollback snapshot
      ansible.builtin.shell:
        cmd: |
          docker service ls > /tmp/teleport-deployment-$(date +%Y%m%d-%H%M%S).log
          docker stack ps gotTeleport_stack >> /tmp/teleport-deployment-$(date +%Y%m%d-%H%M%S).log
      changed_when: false
      tags:
        - never
        - backup

    - name: Display error handling instructions
      ansible.builtin.debug:
        msg: |
          In case of deployment issues:

          1. Check Traefik logs:
             docker service logs gotTeleport_stack_traefik --tail 100

          2. Check Teleport service logs:
             docker service logs gotTeleport_stack_gotTeleport --tail 100

          3. Verify network configuration:
             ip rule list && ip route show table public && ip route show table internal

          4. Rollback if needed:
             docker stack rm gotTeleport_stack
             docker volume rm gotTeleport_stack_traefik-certs gotTeleport_stack_teleport-data

          5. Detailed troubleshooting:
             See docs/DEPLOYMENT_RUNBOOK.md → Troubleshooting section
      tags:
        - never
        - help
