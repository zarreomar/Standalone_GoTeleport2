---
# Teleport Installation and Deployment Tasks
# Orchestrates the deployment of GoTeleport to Docker Swarm

- name: Verify Docker daemon is accessible
  ansible.builtin.command:
    cmd: docker info
  register: docker_info
  changed_when: false

- name: Create teleport config directory
  ansible.builtin.file:
    path: /etc/teleport
    state: directory
    mode: '0755'

- name: Copy teleport configuration
  ansible.builtin.template:
    src: teleport.yaml.j2
    dest: /etc/teleport/teleport.yaml
    mode: '0644'

- name: Ensure Teleport data directory exists
  ansible.builtin.file:
    path: /var/lib/teleport
    state: directory
    mode: '0755'
