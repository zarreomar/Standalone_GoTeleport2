---
# Teleport Installation and Deployment Tasks
# Orchestrates the deployment of GoTeleport to Docker Swarm

- name: Verify Docker daemon is accessible
  community.docker.docker_info:
  register: docker_info
  failed_when: docker_info.host_os is not defined

- name: Create teleport config directory
  ansible.builtin.file:
    path: /etc/teleport
    state: directory
    mode: '0755'

- name: Copy teleport configuration
  ansible.builtin.template:
    src: teleport.yaml.j2
    dest: /etc/teleport/teleport.yaml
    mode: '0644'

- name: Build GoTeleport Docker image
  community.docker.docker_image:
    name: "{{ image_name }}"
    build:
      path: .
      dockerfile: service/Dockerfile
    state: present
  register: build_result

- name: Deploy GoTeleport stack to Docker Swarm
  community.docker.docker_compose:
    project_src: ./service/
    filename: docker-compose.yml
    state: present
    pull: yes
  register: stack_deploy

- name: Wait for GoTeleport service to be healthy
  community.docker.docker_service_info:
    name: "{{ service_name }}"
  register: service_info
  until: service_info.exists | bool
  retries: 10
  delay: 6

- name: Verify service replicas are running
  ansible.builtin.assert:
    that:
      - service_info.service.Spec.Mode.Replicated.Replicas | int > 0
    fail_msg: "No running GoTeleport replicas detected"
