# Reference Teleport configuration for the GoTeleport deployment.
#
# The runtime config is rendered by Ansible into /opt/datavolume/teleport/teleport.yaml
# and mounted into the container. Keep this file in sync with the template.

version: v3

teleport:
  data_dir: /var/lib/teleport
  storage:
    type: postgresql
    conn_string: "postgresql://teleport:change-me-with-a-secret@postgres:5432/teleport_backend?sslmode=disable&pool_max_conns=20"
    audit_events_uri:
      - "postgresql://teleport:change-me-with-a-secret@postgres:5432/teleport_audit?sslmode=disable"
    audit_sessions_uri: "s3://teleport-sessions/records?region=us-east-1&endpoint=minio:9000&insecure=true"
  log:
    output: stderr
    severity: INFO

auth_service:
  enabled: true
  cluster_name: teleport.accesstel.net
  authentication:
    type: local
  session_recording_config:
    mode: node

ssh_service:
  enabled: true
  listen_addr: 0.0.0.0:3022
  public_addr: teleport.accesstel.net:3022
  labels:
    env: production
    cluster: teleport.accesstel.net

proxy_service:
  enabled: true
  web_listen_addr: 0.0.0.0:3080
  public_addr: teleport.accesstel.net:443
  ssh_public_addr: teleport.accesstel.net:3023
  tunnel_public_addr: teleport.accesstel.net:3024
